# reverse_ENV project-scoped Codex configuration.
# Keep reverse-engineering MCP servers here instead of user-level config so other
# Codex projects do not inherit D:\reverse_ENV-specific tool startup.

# IDA Pro reverse engineering through ida-multi-mcp.
[mcp_servers.ida-multi-mcp]
command = "D:\\reverse_ENV\\.venv\\Scripts\\python.exe"
args = ["-m", "ida_multi_mcp"]

[mcp_servers.ida-multi-mcp.env]
IDADIR = "D:\\reverse_ENV\\resource\\portable_win"

# ruyi-mcp: Firefox/BiDi anti-detection, fingerprinting, trace, and Web RE flow.
[mcp_servers.ruyi-mcp]
command = "D:\\reverse_ENV\\tools\\node\\node.exe"
args = ["D:\\reverse_ENV\\mcp\\ruyi-mcp\\build\\src\\index.js"]

[mcp_servers.ruyi-mcp.env]
RUYI_MCP_PYTHON = "D:\\reverse_ENV\\.venv\\Scripts\\python.exe"
RUYI_FIREFOX_PATH = "D:\\reverse_ENV\\tools\\ruyipage\\runtimes\\151-proxy\\firefox\\firefox.exe"

# DBX database MCP through the isolated Node.js 22 runtime.
[mcp_servers.dbx]
command = "D:\\reverse_ENV\\tools\\node22\\node.exe"
args = ["D:\\reverse_ENV\\mcp\\dbx-mcp\\node_modules\\@dbx-app\\mcp-server\\dist\\index.js"]

# On-demand MCPs stay disabled by default. Enable only when the prerequisite GUI,
# browser debugging port, SSE endpoint, or desktop client is already running.

